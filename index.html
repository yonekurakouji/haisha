/* ===== 日本の祝日 自動判定 ===== */
const _holCache={};
function holidaysOf(year){
  if(_holCache[year])return _holCache[year];
  const H={};
  const set=(m,d,name)=>{if(d)H[`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`]=name;};
  const nthMon=(m,n)=>{let c=0;for(let d=1;d<=31;d++){const dt=new Date(year,m-1,d);if(dt.getMonth()!==m-1)break;if(dt.getDay()===1){c++;if(c===n)return d;}}return null;};
  set(1,1,'元日');set(1,nthMon(1,2),'成人の日');set(2,11,'建国記念の日');set(2,23,'天皇誕生日');
  set(3,Math.floor(20.8431+0.242194*(year-1980)-Math.floor((year-1980)/4)),'春分の日');
  set(4,29,'昭和の日');set(5,3,'憲法記念日');set(5,4,'みどりの日');set(5,5,'こどもの日');
  set(7,nthMon(7,3),'海の日');set(8,11,'山の日');set(9,nthMon(9,3),'敬老の日');
  set(9,Math.floor(23.2488+0.242194*(year-1980)-Math.floor((year-1980)/4)),'秋分の日');
  set(10,nthMon(10,2),'スポーツの日');set(11,3,'文化の日');set(11,23,'勤労感謝の日');
  Object.keys(H).slice().forEach(k=>{const dt=pd(k);if(dt.getDay()===0){let nx=addD(dt,1);while(H[fmt(nx)])nx=addD(nx,1);H[fmt(nx)]='振替休日';}});
  _holCache[year]=H;return H;
}

        if(per.excluded)continue;
        if(a.absent)continue; // 不出勤（講習・健診等）は勤務カウントしない
        worked=true;
        const KAISO_V=['R1','R2','R3','R8','R9','S3','S8','P5','P7','大型','増㌧','レンジャー'];
        if(s.enShoo){
          // 他部署応援：応援カウント＋応援時の回送カウント（昼夜別）
          if(slot==='昼'){r.enShooDay++;if((per.drive||0)>0&&a.vehicle){const vKey=KAISO_V.includes(a.vehicle)?'回送':a.vehicle;r.enShooDrive[vKey]=(r.enShooDrive[vKey]||0)+per.drive;r.enShooDriveDay[vKey]=(r.enShooDriveDay[vKey]||0)+per.drive;}if((per.returnDrive||0)>0){const rv=per.returnVehicle||a.vehicle;if(rv){const rvKey=KAISO_V.includes(rv)?'回送':rv;r.enShooDrive[rvKey]=(r.enShooDrive[rvKey]||0)+per.returnDrive;r.enShooDriveDay[rvKey]=(r.enShooDriveDay[rvKey]||0)+per.returnDrive;}}}else{r.enShooNight++;if((per.drive||0)>0&&a.vehicle){const vKey=KAISO_V.includes(a.vehicle)?'回送':a.vehicle;r.enShooDrive[vKey]=(r.enShooDrive[vKey]||0)+per.drive;r.enShooDriveNight[vKey]=(r.enShooDriveNight[vKey]||0)+per.drive;}if((per.returnDrive||0)>0){const rv=per.returnVehicle||a.vehicle;if(rv){const rvKey=KAISO_V.includes(rv)?'回送':rv;r.enShooDrive[rvKey]=(r.enShooDrive[rvKey]||0)+per.returnDrive;r.enShooDriveNight[rvKey]=(r.enShooDriveNight[rvKey]||0)+per.returnDrive;}}}
        } else {
          // 通常現場
          if(isOfficeForWorker(s,dk,workerName))office=true;else genba=true;
          if((per.drive||0)>0&&a.vehicle){const vKey=KAISO_V.includes(a.vehicle)?'回送':a.vehicle;r.drive[vKey]=(r.drive[vKey]||0)+per.drive;}
          if((per.returnDrive||0)>0){const rv=per.returnVehicle||a.vehicle;if(rv){const rvKey=KAISO_V.includes(rv)?'回送':rv;r.drive[rvKey]=(r.drive[rvKey]||0)+per.returnDrive;}}
        }
        const ot=per.ot!==undefined?per.ot:(rep.otDefault||0);
        r.ot+=Number(ot)||0;
        r.kaisou+=Number(per.kaisou)||0;
      }
      // leaveセルで「出勤扱い」の場合はworkedとして加算
      const slotLeave=slot==='昼'?lyDay:lyNight;
      if(!worked&&slotLeave&&slotLeave.work){
        worked=true; // 出勤扱いの講習等
        dayWorked=true;
        if(slot==='昼')daySlotWorked=true;
        if(slot==='夜')nightWorked=true;
      }
      units.push({worked});
      if(worked){
        dayWorked=true;
        if(slot==='昼')daySlotWorked=true;
        if(slot==='夜')nightWorked=true;
        if(office&&!genba)r.office++;else if(genba)r.genba++;
        if(isSunday(dk))r.sun++;
        if(isHoliday(dk))r.hol++;
        if(slot==='夜'){const nx=fmt(addD(pd(dk),1));if(isSunday(nx)||isHoliday(nx))r.beforeHol++;}
      }
    });
    // 有給カウント（昼夜0.5ずつ、最大1.0）
    const lvD=lyDay&&lyDay.type==='有給';
    const lvN=lyNight&&lyNight.type==='有給';
    // 有給だが出勤扱いのスロットは0.5として計算しない（出勤済み）
    const lvDcount=(lvD&&!lyDay.work)?0.5:0;
    const lvNcount=(lvN&&!lyNight.work)?0.5:0;
    const lvTotal=lvDcount+lvNcount;
    if(lvTotal>0)r.leave+=lvTotal;
    if(dayWorked)r.workDays++;
    else if(lvTotal===0&&!lyDay&&!lyNight)r.rest++; // どの予定もない日のみ休日
    r.jitsudo+=(daySlotWorked?1:0)+(nightWorked?1:0);
    if(nightWorked)r.nightDays++;
  });
  let cur=0,renSum=0;
  units.forEach(u=>{
    if(u.worked){cur++;}
    else{if(cur>=2)renSum+=(cur-1);cur=0;}
  });
  if(cur>=2)renSum+=(cur-1);
  r.maxRen=renSum;
  return r;
}

function daysInYear(year){const arr=[];for(let m=1;m<=12;m++){const last=new Date(year,m,0).getDate();for(let d=1;d<=last;d++)arr.push(`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);}return arr;}
/* 8月始まり年度（startYear年8月1日〜翌年7月31日） */
function fyStartYear(dk){const[y,m]=dk.split('-').map(Number);return m>=8?y:y-1;}
function fyDays(startYear){const arr=[];let d=new Date(startYear,7,1);const end=new Date(startYear+1,6,31);while(d<=end){arr.push(fmt(d));d=addD(d,1);}return arr;}
/* 有給の集計期間：入社日の月日を起点に、対象日(refDk)が属する1年。
   例：入社3/15 → 3/15〜翌3/14。入社日未設定ならnullを返す（呼び出し側で会社年度にフォールバック）。 */
function leaveYearDays(hireDate,refDk){
  if(!hireDate)return null;
  const hd=pd(hireDate);const hm=hd.getMonth(),hday=hd.getDate();
  const ref=pd(refDk);
  // refが属する「入社応当日年度」の開始日を求める
  let startYear=ref.getFullYear();
  const anchorThisYear=new Date(ref.getFullYear(),hm,hday);
  if(ref<anchorThisYear)startYear=ref.getFullYear()-1;
  let start=new Date(startYear,hm,hday);
  // 2/29入社などの調整
  if(start.getMonth()!==hm)start=new Date(startYear,hm+1,0);
  let end=addD(new Date(startYear+1,hm,hday),-1);
  if(new Date(startYear+1,hm,hday).getMonth()!==hm)end=addD(new Date(startYear+1,hm+1,0),-1);
  const arr=[];let d=new Date(start);while(d<=end){arr.push(fmt(d));d=addD(d,1);}
  return {days:arr,start:fmt(start),end:fmt(end)};
}

function usageCount(kind){
  const cnt={};
  S.sites.forEach(s=>{
    if(kind==='works')(s.works||[]).forEach(w=>cnt[w]=(cnt[w]||0)+1);
    if(kind==='machines')normMachines(s.machines).forEach(m=>cnt[m.name]=(cnt[m.name]||0)+1);
    if(kind==='supplies')(s.supplies||[]).forEach(sp=>cnt[sp]=(cnt[sp]||0)+1);
    if(kind==='supplies')Object.values(s.dayData||{}).forEach(dd=>(dd.supplies||[]).forEach(sp=>cnt[sp]=(cnt[sp]||0)+1));
    Object.values(s.assigns||{}).forEach(arr=>arr.forEach(a=>{
      if(kind==='roles'&&a.role)cnt[a.role]=(cnt[a.role]||0)+1;
      if(kind==='vehicles'&&a.vehicle)cnt[a.vehicle]=(cnt[a.vehicle]||0)+1;
    }));
  });
  return cnt;
}
function sortByUsage(list,kind,keyFn){
  const cnt=usageCount(kind);
  return list.slice().sort((a,b)=>(cnt[keyFn(b)]||0)-(cnt[keyFn(a)]||0));
}

function ghCfg(){try{return JSON.parse(localStorage.getItem('haisha_gh')||'{}');}catch{return{};}}
function ghSave(c){localStorage.setItem('haisha_gh',JSON.stringify(c));}
window.setupGitHub=function(){
  const cur=ghCfg();
  const owner=prompt('GitHubユーザー名（例：yonekurakouji）',cur.owner||'yonekurakouji');
  if(owner===null)return;
  const repo=prompt('リポジトリ名（例：haisha）',cur.repo||'haisha');
  if(repo===null)return;
  const token=prompt('アクセストークン（ghp_で始まる文字列）を貼り付け\n※前回設定済みなら空欄のままでOK',cur.token||'');
  if(token===null)return;
  ghSave({owner:owner.trim(),repo:repo.trim(),token:(token.trim()||cur.token||'')});
  alert('GitHub設定を保存しました。\nこれで「🚀 サイトを更新」が使えます。');
  render();
};
window.publishToGitHub=async function(){
  const c=ghCfg();
  if(!c.owner||!c.repo||!c.token){
    if(confirm('先にGitHubの設定が必要です。今すぐ設定しますか？')){setupGitHub();}
    return;
  }
  const btn=document.getElementById('pubBtn');
  if(btn){btn.textContent='⏳ 更新中...';btn.disabled=true;}
  try{
    const data={sites:S.sites,workers:S.workers,roles:S.roles,works:S.works,machines:S.machines,vehicles:S.vehicles,contacts:S.contacts,supplies:S.supplies,leave:S.leave,officeAtt:S.officeAtt,orgName:S.orgName,calNotes:S.calNotes||{},actuals:S.actuals,excl:[...S.excl],weekBase:S.weekBase,fiveBase:S.fiveBase,rpYM:S.rpYM,izYM:S.izYM,lastSaved:new Date().toLocaleString('ja-JP'),_savedAt:new Date().toLocaleString('ja-JP')};
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    const api=`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json`;
    let sha=null;
    try{const r=await fetch(api,{headers:{Authorization:`token ${c.token}`}});if(r.ok){const j=await r.json();sha=j.sha;}}catch{}
    const body={message:'予定更新 '+new Date().toLocaleString('ja-JP'),content};
    if(sha)body.sha=sha;
    const res=await fetch(api,{method:'PUT',headers:{Authorization:`token ${c.token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(res.ok){
      // バックアップも保存（data_backup.json）
      try{
        const bkApi=`https://api.github.com/repos/${c.owner}/${c.repo}/contents/data_backup.json`;
        let bkSha=null;
        try{const br=await fetch(bkApi,{headers:{Authorization:`token ${c.token}`}});if(br.ok){const bj=await br.json();bkSha=bj.sha;}}catch{}
        const bkBody={message:'バックアップ '+new Date().toLocaleString('ja-JP'),content};
        if(bkSha)bkBody.sha=bkSha;
        await fetch(bkApi,{method:'PUT',headers:{Authorization:`token ${c.token}`,'Content-Type':'application/json'},body:JSON.stringify(bkBody)});
      }catch{}
      if(btn){btn.textContent='✅ 更新完了！';setTimeout(()=>{btn.textContent='🚀 サイトを更新';btn.disabled=false;},2500);}
      alert('社員向けサイトを更新しました！\n社員さんの画面に最新の予定が反映されます（数十秒後）。');
      S.lastSaved=new Date().toLocaleString('ja-JP');
      persist();render();
    }else{
      throw new Error('GitHub更新失敗（'+res.status+'）'+(res.status===401?'：トークンが正しくないか期限切れです。設定し直してください。':''));
    }
  }catch(err){
    alert('更新に失敗しました。\n'+err.message);
    if(btn){btn.textContent='🚀 サイトを更新';btn.disabled=false;}
  }
};

window.importFile=function(input){

      const toStore={...d};
      if(toStore.excl&&toStore.excl instanceof Set)toStore.excl=[...toStore.excl];

}

      :`<td style="border:1px solid var(--bd3);padding:5px;vertical-align:top;background:var(--bg1);">

          ${daySites.map(renderSiteBlock).join('')}${nightSites.map(renderSiteBlock).join('')}

  }).join('');
  return wNav()+`<div style="overflow-x:auto;"><table class="tbl" style="width:100%;">
    <thead><tr><th style="${thS('#334155','#f1f5f9','width:64px;')}">日付</th><th style="${thS('#334155','#f1f5f9')}">現場・作業員</th></tr></thead>
    <tbody>${dayRows}</tbody></table></div>`;
}

          <span class="lbl">担当:</span>
          <select onchange="US(${si},'contact',this.value)" style="width:92px;"><option value="">選択−</option>${ctOpts}<option value="__manual__"${site.contact==='__manual__'?' selected':''}>手入力</option></select>

        </div>
        <div style="display:flex;align-items:center;gap:2px;"><span class="lbl">置場:</span><select onchange="US(${si},'okiba',this.value)" style="width:56px;"><option value="">−</option><option${site.okiba==='有'?' selected':''}>有</option><option${site.okiba==='無'?' selected':''}>無</option></select></div>
        <div style="display:flex;align-items:center;gap:2px;"><span class="lbl">回送車:</span><select onchange="US(${si},'kaisou',this.value)" style="width:56px;"><option value="">−</option><option${site.kaisou==='○'?' selected':''}>○</option><option${site.kaisou==='×'?' selected':''}>×</option></select></div>

      </div>
      <div class="row2">
        <div style="display:flex;align-items:center;gap:2px;"><span class="lbl">弊社担当:</span><select onchange="US(${si},'ourContact',this.value)" style="width:84px;"><option value="">選択−</option>${S.workers.filter(w=>w.group==='main').map(w=>`<option value="${w.name}"${site.ourContact===w.name?' selected':''}>${w.name}</option>`).join('')}</select></div>
        <div style="display:flex;align-items:center;gap:2px;flex-wrap:wrap;"><span class="lbl">工事内容:</span>${selWK}<select onchange="AWK2(${si},this.value);this.value=''" style="width:88px;"><option value="">＋ 追加</option>${workOpts}</select></div>
        <div style="display:flex;align-items:center;gap:2px;flex-wrap:wrap;"><span class="lbl">使用重機:</span>${selM}<select onchange="AM(${si},this.value);this.value=''" style="width:80px;"><option value="">＋ 追加</option>${machOpts}</select></div>
        <div style="display:flex;align-items:center;gap:2px;flex-wrap:wrap;"><span class="lbl" style="color:#166534;">必要品:</span>${(site.supplies||[]).map((sp,spi)=>`<span class="bmach" style="background:#dcfce7;border-color:#86efac;color:#166534;">${sp}<button onclick="RSP(${si},${spi})">×</button></span>`).join('')}<select onchange="ASP2(${si},this.value);this.value=''" style="width:90px;"><option value="">＋ 選択</option>${sortByUsage(S.supplies,'supplies',x=>x).filter(sp=>!(site.supplies||[]).includes(sp)).map(sp=>`<option value="${sp}">${sp}</option>`).join('')}</select></div>
        <div style="display:flex;align-items:center;gap:2px;"><span class="lbl">時間:</span><select onchange="US(${si},'gatherType',this.value)" style="width:52px;font-size:11px;"><option${(site.gatherType||'集合')==='集合'?' selected':''}>集合</option><option${site.gatherType==='着'?' selected':''}>着</option></select><input value="${site.gatherTime||''}" placeholder="900" onblur="UST(${si},'gatherTime',this)" onkeydown="if(event.key==='Enter'){UST(${si},'gatherTime',this);}" style="width:60px;"></div>
        <input value="${site.note||''}" placeholder="摘要・備考" onchange="US(${si},'note',this.value)" style="flex:1;min-width:90px;">
      </div>
      <div style="margin-bottom:5px;">
        <div class="hint" style="margin-bottom:3px;">工事日 <button class="btn" onclick="event.stopPropagation();S.dispBase=(S.dispBase||0)-3;persist();render();" style="padding:0 6px;font-size:11px;">◀ 前</button><button class="btn" onclick="event.stopPropagation();S.dispBase=0;persist();render();" style="padding:0 6px;font-size:11px;${dispOff!==0?'background:#fef3c7;border-color:#fbbf24;':''}">今日</button><button class="btn" onclick="event.stopPropagation();S.dispBase=(S.dispBase||0)+3;persist();render();" style="padding:0 6px;font-size:11px;">次 ▶</button></div>
        <div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px;">${dayBtns}</div>
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;"><input type="date" id="from_${si}" style="width:140px;"><span class="hint">〜</span><input type="date" id="to_${si}" style="width:140px;"><button class="btn" onclick="AP(${si})">期間追加</button>${site.days?.length?`<span class="hint">計${site.days.length}日</span>`:''}</div>
      </div>
      ${actDays.length?`<div><div class="hint" style="margin-bottom:3px;">割り振り（今週分）</div>${asgSecs}</div>`:''}
    </div>`;
  }).join('§§§'); // 一時区切り文字で分割可能にする
  const cardsArr=cards.split('§§§');
  // アクティブ（今後予定あり）と完了済みに分離
  const todayStr=fmt(toDay());
  const siteCards=S.sites.map((site,si)=>({site,si,card:cardsArr[si]||'',lastDay:(site.days||[]).slice().sort().reverse()[0]||''}));
  // 今日以降の工事日がある or 工事日なし（新規）→ アクティブ
  const activeCards=siteCards.filter(({site})=>(site.days||[]).length===0||(site.days||[]).some(dk=>dk>=todayStr)).sort((a,b)=>{if(!a.lastDay&&!b.lastDay)return 0;if(!a.lastDay)return -1;if(!b.lastDay)return 1;return b.lastDay.localeCompare(a.lastDay);});
  // 工事日が全て過去 → 完了済み
  const doneCards=siteCards.filter(({site})=>(site.days||[]).length>0&&!(site.days||[]).some(dk=>dk>=todayStr)).sort((a,b)=>b.lastDay.localeCompare(a.lastDay));
  const activeHtml=activeCards.map(({card})=>card).join('');
  const doneHtml=doneCards.length?`
    <div style="margin-top:16px;border-top:2px dashed #d1d5db;padding-top:10px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="font-size:12px;font-weight:600;color:#6b7280;">✅ 完了済み現場（${doneCards.length}件）</span>
        <button class="btn" onclick="TogDone()" style="font-size:11px;padding:1px 8px;">${S.showDone?'▲ 隠す':'▼ 表示'}</button>
      </div>
      ${S.showDone?doneCards.map(({card})=>card).join(''):''}
    </div>`:'';
  return`<div class="tb"><strong style="font-size:13px;">配車・割振</strong><span style="font-size:11px;color:var(--tx3);">今日から2週間分</span><button class="btn" onclick="TogPast()" style="${S.showPast?'background:#fef3c7;border-color:#fde68a;color:#92400e;':''}">${S.showPast?'過去も表示中':'今日以降のみ'}</button><button class="btn btnp" onclick="AS()" style="margin-left:auto;">＋ 現場追加</button></div>
  ${dupK.length?`<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:6px;padding:5px 10px;margin-bottom:8px;font-size:11px;color:#991b1b;">⚠ 重複: ${dupK.map(k=>k.split('|').join(' ')).join(' / ')}</div>`:''}
  ${!S.sites.length?'<div style="text-align:center;color:var(--tx3);padding:32px;">「＋ 現場追加」で現場を登録</div>':activeHtml+doneHtml}
  <div id="cmodal"></div>`;
}

function bQ(){
  // 先月・今月・来月の3ヶ月
  const now=toDay();
  const months=[
    new Date(now.getFullYear(),now.getMonth()-1,1),
    new Date(now.getFullYear(),now.getMonth(),1),
    new Date(now.getFullYear(),now.getMonth()+1,1),
  ];
  const fmtYM=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  const lastDay=d=>new Date(d.getFullYear(),d.getMonth()+1,0).getDate();

  // 現場がその月に工事日を持つか（月またぎ対応）
  const sitesInMonth=(ym)=>{
    const [y,m]=ym.split('-').map(Number);
    return S.sites.filter(s=>!s.enShoo&&!(s.place||'').includes('事務所')&&(s.days||[]).some(dk=>{
      const [dy,dm]=dk.split('-').map(Number);
      return dy===y&&dm===m;
    }));
  };

  const cols=months.map(mDate=>{
    const ym=fmtYM(mDate);
    const [y,mo]=ym.split('-').map(Number);
    const label=`${y}年${mo}月`;
    const sites=sitesInMonth(ym);
    // 月内の工事日数合計・社員延べ人数
    const totalDays=sites.reduce((acc,s)=>{
      const cnt=(s.days||[]).filter(dk=>dk.startsWith(ym)).length;
      return acc+cnt;
    },0);
    const totalPerson=sites.reduce((acc,s)=>{
      return acc+(s.days||[]).filter(dk=>dk.startsWith(ym)).reduce((a,dk)=>a+(s.assigns?.[dk]?.length||0),0);
    },0);
    const invoicedCount=sites.filter(s=>(s.invoiced||{})[ym]).length;

    const rows=sites.length?sites.map(s=>{
      const si=S.sites.indexOf(s);
      const daysThisMonth=(s.days||[]).filter(dk=>dk.startsWith(ym)).sort();
      const firstDk=daysThisMonth[0]||'';
      const lastDk=daysThisMonth[daysThisMonth.length-1]||'';
      const period=daysThisMonth.length===1?`${firstDk.slice(5)}`:`${firstDk.slice(5)}〜${lastDk.slice(5)}`;
      const totalSiteDays=s.days?.length||0;
      const isMultiMonth=totalSiteDays>daysThisMonth.length;
      const inv=(s.invoiced||{})[ym];
      const memo=(s.qMemo||{})[ym]||'';
      const personCount=daysThisMonth.reduce((a,dk)=>a+(s.assigns?.[dk]?.length||0),0);
      return`<div style="border:1px solid ${inv?'#86efac':'#e2e8f0'};border-radius:8px;padding:8px 10px;margin-bottom:6px;background:${inv?'#f0fdf4':'#fff'};">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
          <span class="${s.shift==='夜'?'bngt':'bday'}">${s.shift}</span>
          <span style="font-weight:600;font-size:13px;">${s.place||'(未入力)'}</span>
          ${isMultiMonth?'<span style="background:#fef3c7;color:#92400e;font-size:10px;padding:1px 5px;border-radius:4px;">月またぎ</span>':''}
          <button onclick="TogInvoiced(${si},'${ym}')" style="margin-left:auto;padding:2px 10px;font-size:11px;border-radius:4px;border:1px solid ${inv?'#22c55e':'#d1d5db'};background:${inv?'#22c55e':'#fff'};color:${inv?'#fff':'#374151'};cursor:pointer;white-space:nowrap;">${inv?'✅ 請求済':'請求済にする'}</button>
        </div>
        <div style="font-size:11px;color:#64748b;display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px;">
          ${s.prime?`<span>元請: <b>${s.prime}</b></span>`:''}
          <span>期間: <b>${period}</b>${isMultiMonth?` (この月${daysThisMonth.length}日/計${totalSiteDays}日)`:`(${daysThisMonth.length}日)`}</span>
          <span>延べ人数: <b>${personCount}人</b></span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <input value="${memo}" placeholder="備考メモ" onchange="SetQMemo(${si},'${ym}',this.value)" style="flex:1;font-size:11px;border:1px solid #e2e8f0;border-radius:4px;padding:3px 6px;">
          <button class="btn" onclick="EditSite('${s.id}')" style="font-size:10px;padding:1px 6px;">✎ 編集</button>
        </div>
      </div>`;
    }).join(''):`<div style="color:#94a3b8;text-align:center;padding:16px;font-size:12px;">この月の工事なし</div>`;

    const isCurrentMonth=ym===fmtYM(now);
    return`<div style="flex:1;min-width:280px;max-width:400px;">
      <div style="background:${isCurrentMonth?'#1e40af':'#334155'};color:#fff;border-radius:8px 8px 0 0;padding:8px 12px;display:flex;align-items:center;gap:8px;">

function primeColor(name){
  const PAL=[['#fee2e2','#991b1b'],['#dbeafe','#1e40af'],['#dcfce7','#166534'],['#fef3c7','#92400e'],['#ede9fe','#5b21b6'],['#e0f2fe','#075985'],['#fce7f3','#9d174d'],['#ffedd5','#9a3412'],['#ecfccb','#3f6212'],['#cffafe','#155e75'],['#fef9c3','#854d0e'],['#e0e7ff','#3730a3'],['#fae8ff','#86198f'],['#d1fae5','#065f46'],['#fecdd3','#9f1239'],['#c7d2fe','#312e81'],['#fed7aa','#7c2d12'],['#d9f99d','#3f6212'],['#bae6fd','#0c4a6e'],['#e2e8f0','#334155']];
  if(!name)return PAL[PAL.length-1];
  /* 表記ゆれで同じ会社が別名になっている場合はここに追加すると同じ色になります */
  const PRIME_ALIAS={'工藤建設工業':'工藤建設','常盤茨':'常盤工業'};
  const norm=n=>PRIME_ALIAS[n]||n;
  /* 実在する元請名の一覧から順番に色を割り当てる（同じ会社は毎回同じ色、別会社は別の色になりやすい） */
  const names=[...new Set((S.sites||[]).map(s=>norm(s.prime)).filter(Boolean))].sort();
  const idx=names.indexOf(norm(name));
  return idx>=0?PAL[idx%PAL.length]:PAL[(function(){let h=0;for(let i=0;i<name.length;i++){h=(h*31+name.charCodeAt(i))>>>0;}return h%PAL.length;})()];
}

  let totD=0,totA=0;const drvC={};

  const rows=mDays.map(dk=>{

          ${(()=>{const allPer=rep.per||{};const siteFees=(s.assigns?.[dk]||[]).reduce((t,aa)=>{const pp=allPer[aa.name]||{};return t+(pp.tollFee||0)+(pp.parkingFee||0);},0)+(rep.otherFee||0);const myFee=(rper.tollFee||0)+(rper.parkingFee||0);return(myFee||siteFees)?`<div style="font-size:10px;color:#0369a1;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;">${rper.tollFee?`<span>🛣高速 ¥${Number(rper.tollFee).toLocaleString()}</span>`:''}${rper.parkingFee?`<span>🅿駐車 ¥${Number(rper.parkingFee).toLocaleString()}</span>`:''}${rep.otherFee?`<span>💰他 ¥${Number(rep.otherFee).toLocaleString()}</span>`:''}${siteFees?`<span style="background:#eff6ff;border-radius:3px;padding:0 4px;">現場合計 ¥${siteFees.toLocaleString()}</span>`:''}</div>`:'';})()}

        ${!has?'<span class="hint">予定なし</span>':ds.map(({s,a})=>a.absent?`<span style="font-size:11px;color:#92400e;">📋 ${a.absent}</span>`:`<span class="${s.shift==='夜'?'bngt':'bday'}">${s.shift}</span><b style="font-size:11px;margin-left:3px;">${s.place||'(未設定)'}</b>`).join('')}${ds.length===0&&Object.keys(lv).length?Object.entries(lv).map(([slot,slv])=>`<span style="font-size:11px;color:#0369a1;">${slot} ${slv.type}</span>`).join('　'):''}

  }).join('');
  // ===== 全集計（月＋年度8月始まり） =====

  };

    const driveNightKs=Object.keys(agg.enShooDriveNight||{});
    const driveDayStr=driveDayKs.length?driveDayKs.map(v=>`${v}: <b>${agg.enShooDriveDay[v]}</b>回`).join(' / '):'なし';
    const driveNightStr=driveNightKs.length?driveNightKs.map(v=>`${v}: <b>${agg.enShooDriveNight[v]}</b>回`).join(' / '):'なし';
    return`<div style="margin-top:8px;background:#f5f3ff;border:1px solid #c4b5fd;border-radius:6px;padding:8px;">

  };
  // 回送回数＝現場で回送車(R/S/P/レンジャー/大型/増㌧)を運転した回数＋他部署応援時の回送＋手入力回送
  const kaisoTotal=a=>((a.drive&&a.drive['回送'])||0)+((a.enShooDrive&&a.enShooDrive['回送'])||0)+(a.kaisou||0);
  const sumCard=(title,agg,extra,head,foot,feeT)=>`<div class="card" style="margin-top:10px;${extra||''}">

  // 有給は入社日起点で数える（入社日未設定なら会社年度）

    if(!list.length)return`<div style="max-width:520px;margin:0 auto;">${head}<div style="text-align:center;color:var(--tx3);padding:12px;font-size:12px;">今月はまだ回送回数の入力がありません。<br>週間予定表や日報の各社員の「回送 ◻回」に入力すると、ここで合計されます。</div></div>`;

/* 事務員の日報（出勤状況） */
function officeReport(w,ry,rm){
  const monthDks=daysInMonth(S.rpYM);
  let work=0,leave=0,off=0;
  const rows=monthDks.map(dk=>{
    const dt=pd(dk),dw=dt.getDay();
    const st=(S.officeAtt[dk]&&S.officeAtt[dk][w.name])||'';
    if(st==='work')work++;else if(st==='leave')leave++;else if(st==='off')off++;
    const disp=st==='work'?{t:'出勤',c:'#166534',bg:'#dcfce7'}:st==='leave'?{t:'有給',c:'#86198f',bg:'#fae8ff'}:st==='off'?{t:'休',c:'#94a3b8',bg:'#f1f5f9'}:{t:'—',c:'var(--tx3)',bg:'var(--bg1)'};
    const isSun=dw===0,isHol=isHoliday(dk);
    return`<tr><td style="text-align:center;${isSun?'color:#dc2626;':isHol?'color:#ea580c;':''}">${rm}/${dt.getDate()}(${WD[dw]})</td><td style="text-align:center;background:${disp.bg};color:${disp.c};font-weight:500;">${disp.t}</td></tr>`;
  }).join('');
  // 有給は入社日起点
  const ly=leaveYearDays(w.hireDate,S.rpYM+'-15');
  let leaveByHire=null;

function bI(){
  const [ry,rm]=S.izYM.split('-').map(Number);
  const last=new Date(ry,rm,0).getDate();
  const mDays=Array.from({length:last},(_,i)=>`${S.izYM}-${String(i+1).padStart(2,'0')}`);
  const exD=mDays.filter(dk=>S.excl.has(dk)).length,wkD=last-exD;
  const counts=S.workers.map(w=>{let c=0;mDays.forEach(dk=>{if(S.sites.some(s=>(s.days||[]).includes(dk)&&(s.assigns?.[dk]||[]).some(a=>a.name===w.name)))c++;});return{w,c};}).filter(x=>x.c>0).sort((a,b)=>b.c-a.c);
  const maxC=Math.max(...counts.map(x=>x.c),1);
  const bars=counts.map(({w,c})=>{const bl=Math.round(c/maxC*340),isH=w.group==='helper';return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;"><div style="width:52px;text-align:right;font-size:12px;font-weight:${isH?'400':'500'};color:${isH?'var(--tx2)':'var(--tx)'};">${w.name}</div><div style="flex:1;background:var(--bg2);border-radius:4px;height:20px;overflow:hidden;"><div style="width:${bl}px;max-width:100%;height:100%;background:${isH?'#94a3b8':'#1e40af'};border-radius:4px;display:flex;align-items:center;padding-left:6px;"><span style="font-size:11px;color:#fff;white-space:nowrap;font-weight:500;">${c}日 (${wkD>0?Math.round(c/wkD*100):0}%)</span></div></div></div>`;}).join('');
  return`<div class="tb"><strong style="font-size:13px;">出面（全体）</strong><button class="btn" onclick="CI(-1)">◀</button><strong>${ry}年 ${rm}月</strong><button class="btn" onclick="CI(1)">▶</button><span class="hint" style="margin-left:6px;">稼働日:${wkD}日</span></div>
  ${!counts.length?'<div style="text-align:center;color:var(--tx3);padding:32px;">データがありません</div>':`<div class="card"><div style="font-weight:500;margin-bottom:10px;">${ry}年${rm}月 出勤日数</div>${bars}</div>

  ${counts.map(({w,c})=>`<tr><td style="font-weight:${w.group==='main'?'500':'400'};">${w.name}</td><td style="text-align:center;">${c}日</td><td style="text-align:center;">${wkD>0?Math.round(c/wkD*100):0}%</td><td style="text-align:center;font-size:10px;">${w.group==='main'?'メンバー':'助っ人'}</td></tr>`).join('')}
  <tr style="background:var(--bg2);font-weight:500;"><td>合計(延べ)</td><td style="text-align:center;">${counts.reduce((s,x)=>s+x.c,0)}日</td><td colspan="2"></td></tr>

}

/* ===== 個別日報の一括印刷 ===== */
function printDayLabel(dk){const dt=pd(dk);return`${dt.getMonth()+1}/${dt.getDate()}(${WD[dt.getDay()]})`;}
function workerMonthDetail(name,monthDks){
  const todayK=fmt(toDay());
  // その月、その社員が出た現場を日付順に（今日以前のみ）
  const rows=[];
  monthDks.filter(dk=>dk<=todayK).forEach(dk=>{
    ['昼','夜'].forEach(slot=>{
      S.sites.forEach(s=>{
        if(s.shift!==slot)return;
        if(!(s.days||[]).includes(dk))return;
        const a=(s.assigns?.[dk]||[]).find(x=>x.name===name);
        if(!a)return;
        const dd=(s.dayData&&s.dayData[dk])||{};
        const rep=getReport(s,dk);const per=(rep.per&&rep.per[name])||{};
        const ot=per.ot!==undefined?per.ot:(rep.otDefault||0);
        rows.push({dk,slot,place:s.place||'',cancelled:dd.cancelled,alt:dd.altWork||'',
          work:a.role||'',start:rep.start||'',end:rep.end||'',weather:rep.weather||'',
          ot:ot||'',drive:per.drive||'',vehicle:a.vehicle||'',returnVehicle:per.returnVehicle||'',returnDrive:per.returnDrive||'',kaisou:per.kaisou||0,
          tollFee:per.tollFee||0,parkingFee:per.parkingFee||0,otherFee:rep.otherFee||0,feeNote:rep.feeNote||'',
          office:isOfficeForWorker(s,dk,name)});
      });
    });
  });
  return rows;
}
function onePersonPage(w,ym){

  return`<div class="pp">

      <thead><tr><th>日付</th><th>昼夜</th><th>現場</th><th>担当</th><th>時間</th><th>天候</th><th>残業</th><th>運転</th><th>経費</th></tr></thead>

      <div>有給 <b>${agg.leave}</b>日</div>
      <div>残業合計 <b>${agg.ot}</b>h</div>
      <div>休日 <b>${agg.rest}</b>日</div>
      <div>日曜出勤 <b>${agg.sun}</b>日</div>
      <div>祝日出勤 <b>${agg.hol}</b>日</div>

      ${feeTotal?`<div>経費合計 <b style="color:#0369a1;">¥${feeTotal.toLocaleString()}</b></div>`:''}

    detail.forEach(r=>{const fee=(r.tollFee||0)+(r.parkingFee||0)+(r.otherFee||0);body+=`${printDayLabel(r.dk)} ${r.slot} ${r.place}${r.cancelled?'(中止)':''}${r.office?'[事務所]':''} ${r.work} ${r.start}${(r.start||r.end)?'〜':''}${r.end} ${r.ot!==''?'残業'+r.ot+'h':''} ${r.drive!==''?'行き'+r.vehicle+r.drive+'回':''}${r.returnDrive?' 帰り'+(r.returnVehicle||r.vehicle)+r.returnDrive+'回':''}${r.kaisou?' 回送'+r.kaisou+'回':''}${fee?' 経費¥'+fee:''}\n`;});

  const feeTotal=detail.reduce((s,r)=>s+(r.tollFee||0)+(r.parkingFee||0)+(r.otherFee||0),0);
  body+=`\n【月集計】\n`;
  body+=`勤務日数:${agg.workDays}日 / 夜間出勤:${agg.nightDays}日 / 連荘:${agg.maxRen}\n`;
  body+=`現場回数:${agg.genba}回 / 事務所回数:${agg.office}回\n`;
  body+=`有給:${agg.leave}日 / 残業合計:${agg.ot}h / 休日:${agg.rest}日\n`;
  body+=`日曜出勤:${agg.sun}日 / 祝日出勤:${agg.hol}日 / 日祝前(夜):${agg.beforeHol}回\n`;
  const drv=Object.keys(agg.drive).length?Object.entries(agg.drive).map(([v,c])=>`${v}:${c}回`).join(' '):'なし';
  body+=`運転:${drv}\n`;
  if(feeTotal)body+=`経費合計:¥${feeTotal.toLocaleString()}\n`;
  const ly=leaveYearDays(w.hireDate,ym+'-15');
  if(ly){let lc=0;ly.days.forEach(dk=>{if(S.leave[dk]&&S.leave[dk][w.name])lc++;if(S.officeAtt[dk]&&S.officeAtt[dk][w.name]==='leave')lc++;});body+=`\n【有給(入社日起点 ${ly.start}〜${ly.end})】使用 ${lc}日\n`;}
  return body;
}

window.execCopy=function(si,srcDk){
  const destDk=document.getElementById('cdest')?.value;
  if(!destDk){alert('コピー先の日付を選択してください');return;}
  if(destDk===srcDk){alert('同じ日付にはコピーできません');return;}
  const s=S.sites[si];s.assigns=s.assigns||{};
  // 社員の割り振り（誰・役割・車・運転・摘要）を丸ごとコピー
  s.assigns[destDk]=dc(s.assigns[srcDk]||[]);
  // その日の上書き内容（工事内容・重機・集合・別作業など）もコピー
  s.dayData=s.dayData||{};
  if(s.dayData[srcDk]){
    const src=dc(s.dayData[srcDk]);
    delete src.cancelled; // 中止状態はコピーしない（新しい日は通常稼働として開始）
    s.dayData[destDk]={...(s.dayData[destDk]||{}),...src};
  }
  if(!s.days.includes(destDk)){s.days.push(destDk);s.days.sort();}
  S.openDays[`${si}_${destDk}`]=true;
  persist();closeCopy();render();
};

/* ===== チェックリストモーダル（工事内容・使用重機・必要品） ===== */
window.showCheckModal=function(si,dk,kind){
  const site=S.sites[si];
  const d=_dd(si,dk);
  const titles={works:'工事内容',machines:'使用重機',supplies:'必要品'};
  const title=titles[kind]||kind;

  /* 既存モーダルを除去 */
  const old=document.getElementById('ckOverlay');if(old)old.remove();

  /* オーバーレイ */
  const overlay=document.createElement('div');
  overlay.id='ckOverlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:2000;';

  /* パネル */
  const panel=document.createElement('div');
  panel.style.cssText='background:#fff;border-radius:12px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,0.25);width:340px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;';

  /* タイトル */
  const ttl=document.createElement('div');
  ttl.style.cssText='font-weight:600;font-size:14px;margin-bottom:10px;flex-shrink:0;';
  ttl.textContent=title+'を選択';

  /* スクロール本体 */
  const scroller=document.createElement('div');
  scroller.style.cssText='overflow-y:auto;flex:1;';

  /* 閉じるボタン */
  const closeBtn=document.createElement('button');
  closeBtn.textContent='閉じる';
  closeBtn.style.cssText='margin-top:10px;padding:6px 20px;border-radius:6px;border:1px solid #d1d5db;background:#f8fafc;font-size:13px;cursor:pointer;align-self:flex-end;flex-shrink:0;';
  closeBtn.onclick=function(){overlay.remove();render();};

  function buildItems(){
    scroller.innerHTML='';
    if(kind==='works'){
      const cur=dayWorksArr(d.works)||[];
      sortByUsage(S.works,'works',x=>x).forEach(w=>{
        const row=document.createElement('label');
        const chk=cur.includes(w);
        row.style.cssText=`display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;background:${chk?'#dbeafe':'#f8fafc'};margin-bottom:3px;cursor:pointer;font-size:13px;`;
        const cb=document.createElement('input');cb.type='checkbox';cb.checked=chk;cb.style.cssText='width:16px;height:16px;';
        cb.onchange=function(){CKW(si,dk,w,this.checked);buildItems();};
        const lbl=document.createElement('span');lbl.textContent=w;
        row.appendChild(cb);row.appendChild(lbl);scroller.appendChild(row);
      });
      /* 手入力 */
      const addRow=document.createElement('div');addRow.style.cssText='display:flex;gap:4px;margin-top:8px;';
      const inp=document.createElement('input');inp.placeholder='手入力で追加';inp.style.cssText='flex:1;font-size:12px;border:1px solid #d1d5db;border-radius:4px;padding:2px 6px;';
      const addBtn=document.createElement('button');addBtn.textContent='＋追加';addBtn.className='btn btnp';addBtn.style.fontSize='12px';
      addBtn.onclick=function(){const v=inp.value.trim();if(!v)return;if(!S.works.includes(v))S.works.push(v);const arr=dayWorksArr(d.works)||[];if(!arr.includes(v))arr.push(v);d.works=arr;inp.value='';persist();render();buildItems();};
      addRow.appendChild(inp);addRow.appendChild(addBtn);scroller.appendChild(addRow);
    }
    if(kind==='machines'){
      sortByUsage(S.machines,'machines',x=>x).forEach(m=>{
        /* buildItems()呼び出しのたびに最新データを取得 */
        const cur=dayMachArr(d.machines)||[];
        const ex=cur.find(x=>x.name===m);const chk=!!ex;
        const wrap=document.createElement('div');
        wrap.style.cssText=`border-radius:6px;background:${chk?'#dbeafe':'#f8fafc'};margin-bottom:4px;padding:6px 8px;`;
        /* 重機行 */
        const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:6px;';
        const cb=document.createElement('input');cb.type='checkbox';cb.checked=chk;cb.style.cssText='width:16px;height:16px;';
        cb.onchange=function(){CKM(si,dk,m,this.checked);buildItems();};
        const lbl=document.createElement('span');lbl.style.cssText='flex:1;font-family:monospace;font-weight:500;font-size:13px;';lbl.textContent=m;
        row.appendChild(cb);row.appendChild(lbl);
        if(chk){
          const qinp=document.createElement('input');qinp.type='number';qinp.min='1';qinp.value=ex.qty||1;
          qinp.style.cssText='width:44px;font-size:11px;border:1px solid #d1d5db;border-radius:4px;padding:1px 3px;';
          qinp.onchange=function(){CKMQty(si,dk,m,this.value);};
          const qt=document.createElement('span');qt.textContent='台';qt.style.fontSize='11px';
          row.appendChild(qinp);row.appendChild(qt);
        }
        wrap.appendChild(row);
        /* 運搬車ボタン */
        if(chk&&S.vehicles.length){
          const vrow=document.createElement('div');vrow.style.cssText='display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;padding-left:22px;align-items:center;';
          const vlbl=document.createElement('span');vlbl.textContent='運搬車:';vlbl.style.cssText='font-size:10px;color:#64748b;';
          vrow.appendChild(vlbl);
          S.vehicles.forEach(function(v){
            const vn=v.name||v;
            const sel=(ex.carrier||'')===vn;
            const vbtn=document.createElement('button');
            vbtn.textContent=vn;
            vbtn.style.cssText='padding:2px 8px;font-size:11px;border-radius:4px;border:2px solid '+(sel?'#1d4ed8':'#d1d5db')+';background:'+(sel?'#dbeafe':'#fff')+';color:'+(sel?'#1d4ed8':'#374151')+';cursor:pointer;white-space:nowrap;';
            vbtn.onclick=function(){
              const arr=dayMachArr(d.machines)||[];
              const x=arr.find(a=>a.name===m);
              if(x){
                /* 押した時点で現在の値を確認してトグル */
                x.carrier=(x.carrier===vn)?'':vn;
              }
              d.machines=arr;
              persist();
              buildItems();
            };
            vrow.appendChild(vbtn);
          });
          wrap.appendChild(vrow);
        }
        scroller.appendChild(wrap);
      });
      /* 手入力 */
      const addRow=document.createElement('div');addRow.style.cssText='display:flex;gap:4px;margin-top:8px;';
      const inp=document.createElement('input');inp.placeholder='手入力で追加';inp.style.cssText='flex:1;font-size:12px;border:1px solid #d1d5db;border-radius:4px;padding:2px 6px;';
      const addBtn=document.createElement('button');addBtn.textContent='＋追加';addBtn.className='btn btnp';addBtn.style.fontSize='12px';
      addBtn.onclick=function(){const v=inp.value.trim();if(!v)return;if(!S.machines.includes(v))S.machines.push(v);const arr=dayMachArr(d.machines)||[];if(!arr.some(x=>x.name===v))arr.push({name:v,qty:1,carrier:''});d.machines=arr;inp.value='';persist();render();buildItems();};
      addRow.appendChild(inp);addRow.appendChild(addBtn);scroller.appendChild(addRow);
    }
    if(kind==='supplies'){
      const cur=d.supplies||[];
      sortByUsage(S.supplies,'supplies',x=>x).forEach(sp=>{
        const row=document.createElement('label');
        const chk=cur.includes(sp);
        row.style.cssText=`display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;background:${chk?'#dcfce7':'#f8fafc'};margin-bottom:3px;cursor:pointer;font-size:13px;`;
        const cb=document.createElement('input');cb.type='checkbox';cb.checked=chk;cb.style.cssText='width:16px;height:16px;';
        cb.onchange=function(){CKSP(si,dk,sp,this.checked);buildItems();};
        const lbl=document.createElement('span');lbl.textContent=sp;
        row.appendChild(cb);row.appendChild(lbl);scroller.appendChild(row);
      });
      /* 手入力 */
      const addRow=document.createElement('div');addRow.style.cssText='display:flex;gap:4px;margin-top:8px;';
      const inp=document.createElement('input');inp.placeholder='手入力で追加';inp.style.cssText='flex:1;font-size:12px;border:1px solid #d1d5db;border-radius:4px;padding:2px 6px;';
      const addBtn=document.createElement('button');addBtn.textContent='＋追加';addBtn.className='btn btnp';addBtn.style.fontSize='12px';
      addBtn.onclick=function(){const v=inp.value.trim();if(!v)return;if(!S.supplies.includes(v))S.supplies.push(v);const arr=[...(d.supplies||[])];if(!arr.includes(v))arr.push(v);d.supplies=arr;inp.value='';persist();render();buildItems();};
      addRow.appendChild(inp);addRow.appendChild(addBtn);scroller.appendChild(addRow);
    }
  }

  buildItems();
  panel.appendChild(ttl);panel.appendChild(scroller);panel.appendChild(closeBtn);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  /* 背景クリックで閉じる */
  overlay.addEventListener('mousedown',function(e){if(e.target===overlay){overlay.remove();render();}});
};
/* チェック操作：工事内容 */
window.CKW=(si,dk,w,chk)=>{const d=_dd(si,dk);const arr=dayWorksArr(d.works)||[];if(chk){if(!arr.includes(w))arr.push(w);}else{const i=arr.indexOf(w);if(i>=0)arr.splice(i,1);}d.works=arr.length?arr:undefined;persist();};
window.CKWAdd=(si,dk)=>{const el=document.getElementById(`ckwAdd_${si}_${dk}`);const v=(el?.value||'').trim();if(!v)return;if(!S.works.includes(v))S.works.push(v);const d=_dd(si,dk);const arr=dayWorksArr(d.works)||[];if(!arr.includes(v))arr.push(v);d.works=arr;el.value='';persist();render();if(window._ckCtx)window._ckCtx.rebuild();};
/* チェック操作：使用重機 */
window.CKM=(si,dk,m,chk)=>{const d=_dd(si,dk);const arr=dayMachArr(d.machines)||[];if(chk){if(!arr.some(x=>x.name===m))arr.push({name:m,qty:1,carrier:''});}else{const i=arr.findIndex(x=>x.name===m);if(i>=0)arr.splice(i,1);}d.machines=arr.length?arr:undefined;persist();};
window.CKMQty=(si,dk,m,v)=>{const d=_dd(si,dk);const arr=dayMachArr(d.machines)||[];const x=arr.find(a=>a.name===m);if(x)x.qty=Math.max(1,Number(v)||1);d.machines=arr;persist();/* render不要 */};
window.CKMCarrier=(si,dk,m,v)=>{
  const d=_dd(si,dk);
  const arr=dayMachArr(d.machines)||[];
  const x=arr.find(a=>a.name===m);
  if(x)x.carrier=v;
  d.machines=arr;
  persist();
  /* ボタンの見た目だけ更新（rebuildなし） */
  const body=document.getElementById('ckModalBody');
  if(!body)return;
  body.querySelectorAll('button[data-mname]').forEach(btn=>{
    const isSel=btn.dataset.mname===m&&btn.dataset.vname===v;
    btn.style.background=isSel?'#dbeafe':'#fff';
    btn.style.borderColor=isSel?'#1d4ed8':'#d1d5db';
    btn.style.color=isSel?'#1d4ed8':'#374151';
  });
};
window.CKMAdd=(si,dk)=>{const el=document.getElementById(`ckmAdd_${si}_${dk}`);const v=(el?.value||'').trim();if(!v)return;if(!S.machines.includes(v))S.machines.push(v);const d=_dd(si,dk);const arr=dayMachArr(d.machines)||[];if(!arr.some(x=>x.name===v))arr.push({name:v,qty:1,carrier:''});d.machines=arr;el.value='';persist();render();if(window._ckCtx)window._ckCtx.rebuild();};
/* チェック操作：必要品 */

window.CKSPAdd=(si,dk)=>{const el=document.getElementById(`ckspAdd_${si}_${dk}`);const v=(el?.value||'').trim();if(!v)return;if(!S.supplies.includes(v))S.supplies.push(v);const d=_dd(si,dk);const arr=[...(d.supplies||[])];if(!arr.includes(v))arr.push(v);d.supplies=arr;el.value='';persist();render();if(window._ckCtx)window._ckCtx.rebuild();};
/* 重機チップの運搬車を直接変更 */

window.closeCkModal=()=>{const el=document.getElementById('cmodal');if(el)el.innerHTML='';};
window.ToggleCancel=(si,dk)=>{const s=S.sites[si];s.dayData=s.dayData||{};s.dayData[dk]=s.dayData[dk]||{};s.dayData[dk].cancelled=!s.dayData[dk].cancelled;persist();render();};
window.RM=(si,mi)=>{S.sites[si].machines.splice(mi,1);persist();render();};
window.AWK2=(si,w)=>{if(!w)return;const s=S.sites[si];s.works=s.works||[];if(!s.works.includes(w))s.works.push(w);persist();render();};

window.AP=si=>{const f=document.getElementById(`from_${si}`)?.value,t=document.getElementById(`to_${si}`)?.value;if(!f||!t)return;const s=S.sites[si];s.days=s.days||[];let c=pd(f);const e=pd(t);while(c<=e){const dk=fmt(c);if(!s.days.includes(dk))s.days.push(dk);c=addD(c,1);}s.days.sort();persist();render();};
window.TOD=(si,dk)=>{const k=`${si}_${dk}`;S.openDays[k]=!S.openDays[k];persist();render();};
window.AA=(si,dk)=>{
  const site=S.sites[si];if(!site)return;
  const shift=site.shift;
  const alreadyHere=new Set((site.assigns?.[dk]||[]).map(a=>a.name).filter(Boolean));
  const alreadyElsewhere=new Set();
  S.sites.forEach((s,i)=>{if(i===si||s.shift!==shift)return;(s.assigns?.[dk]||[]).forEach(a=>{if(a.name)alreadyElsewhere.add(a.name);});});
  const mainW=S.workers.filter(w=>w.group==='main');
  const helperW=S.workers.filter(w=>w.group==='helper');
  const mkRow=(w,cls)=>{const here=alreadyHere.has(w.name),ew=alreadyElsewhere.has(w.name);
    return`<label style="display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;cursor:${here?'default':'pointer'};background:${here?'#f0fdf4':ew?'#f8fafc':'var(--bg1)'};border:1px solid ${here?'#86efac':ew?'#e2e8f0':'transparent'};margin-bottom:2px;"><input type="checkbox" class="${cls}" value="${w.name}" ${here?'checked disabled':''} style="width:16px;height:16px;cursor:${here?'default':'pointer'};"><span style="font-size:12px;${here?'color:#166534;font-weight:600;':''}${ew&&!here?'color:#94a3b8;':''}">${w.name}${here?' ✅':''}${ew&&!here?' (他現場)':''}</span></label>`;};
  let modal=document.getElementById('cmodal');
  if(!modal){modal=document.createElement('div');modal.id='cmodal';document.body.appendChild(modal);}
  modal.innerHTML=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;" onclick="if(event.target===this)closeCopy()"><div style="background:var(--bg1);border-radius:12px 12px 0 0;padding:16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;"><div style="font-weight:600;font-size:14px;margin-bottom:10px;">社員追加</div><div style="margin-bottom:8px;"><div style="font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px;">メンバー</div>${mainW.map(w=>mkRow(w,'wsel-ck')).join('')}</div><div style="margin-bottom:8px;"><div style="font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px;">助っ人</div>${helperW.map(w=>mkRow(w,'hsel-ck')).join('')}</div><div style="margin-bottom:12px;padding:8px;background:var(--bg2);border-radius:6px;"><div style="font-size:11px;color:var(--tx2);margin-bottom:4px;">外注・手入力</div><div style="display:flex;gap:6px;margin-bottom:6px;"><select id="aaAddType" onchange="(()=>{const t=this.value;document.getElementById('aaManualWrap').style.display=t==='manual'?'flex':'none';document.getElementById('aaGaichuuWrap').style.display=t==='gaichuu'?'flex':'none';})()" style="width:80px;font-size:12px;"><option value="manual">手入力</option><option value="gaichuu">外注</option></select><div id="aaManualWrap" style="display:flex;flex:1;gap:4px;"><input id="aaManualName" placeholder="名前を入力" style="flex:1;font-size:12px;"></div><div id="aaGaichuuWrap" style="display:none;flex:1;align-items:center;gap:4px;"><input id="aaGaichuuCount" type="number" min="1" value="1" style="width:60px;font-size:12px;">人</div></div></div><div style="display:flex;gap:6px;"><button class="btn" onclick="closeCopy()" style="flex:1;">キャンセル</button><button class="btn btnp" onclick="execAA(${si},'${dk}')" style="flex:1;">追加する</button></div></div></div>`;
  S.openDays[`${si}_${dk}`]=true;
};
window.execAA=(si,dk)=>{
  const s=S.sites[si];if(!s)return;
  s.assigns=s.assigns||{};s.assigns[dk]=s.assigns[dk]||[];
  const alreadyHere=new Set(s.assigns[dk].map(a=>a.name).filter(Boolean));
  document.querySelectorAll('.wsel-ck:checked:not(:disabled),.hsel-ck:checked:not(:disabled)').forEach(ck=>{
    if(!alreadyHere.has(ck.value)){s.assigns[dk].push({name:ck.value,role:'',vehicle:'',isDriver:false,memo:'',absent:''});alreadyHere.add(ck.value);}
  });
  const addType=document.getElementById('aaAddType')?.value;
  if(addType==='gaichuu'){
    const cnt=parseInt(document.getElementById('aaGaichuuCount')?.value||'1');
    for(let i=0;i<cnt;i++)s.assigns[dk].push({name:'外注',role:'',vehicle:'',isDriver:false,memo:'',absent:''});
  } else {
    const mn=(document.getElementById('aaManualName')?.value||'').trim();
    if(mn)s.assigns[dk].push({name:mn,role:'',vehicle:'',isDriver:false,memo:'',absent:''});
  }
  S.openDays[`${si}_${dk}`]=true;
  persist();
  const cm=document.getElementById('cmodal');if(cm)cm.innerHTML='';
  render();
};
window.UA=(si,dk,ai,k,v)=>{if(S.sites[si].assigns?.[dk]?.[ai])S.sites[si].assigns[dk][ai][k]=v;persist();};
window.SetDayLeader=(si,dk,ai)=>{const assigns=S.sites[si].assigns?.[dk];if(!assigns)return;const isAlready=assigns[ai].isLeader;assigns.forEach((a,i)=>a.isLeader=(i===ai&&!isAlready));persist();render();};
window.RA=(si,dk,ai)=>{S.sites[si].assigns[dk].splice(ai,1);persist();render();};
window.SRW=v=>{S.rpW=v;persist();render();};
window.FY=d=>{const cur=S.fyView!==null?S.fyView:fyStartYear(S.rpYM+'-01');S.fyView=cur+d;persist();render();};
window.CM=d=>{const[y,m]=S.rpYM.split('-').map(Number);const nd=new Date(y,m-1+d,1);S.rpYM=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;S.fyView=null;persist();render();};
window.CI=d=>{const[y,m]=S.izYM.split('-').map(Number);const nd=new Date(y,m-1+d,1);S.izYM=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;persist();render();};
window.ACT=(k,f,v)=>{S.actuals[k]=S.actuals[k]||{};S.actuals[k][f]=v;persist();};
window.AW=()=>{const no=document.getElementById('nwno')?.value.trim(),name=document.getElementById('nwname')?.value.trim(),group=document.getElementById('nwg')?.value||'main';if(!name)return;S.workers.push({no:no||'—',name,fullName:name,kana:'',birth:'',group,hireDate:'',email:''});persist();render();};
window.ACT2=()=>{const n=document.getElementById('nctn')?.value.trim(),t=document.getElementById('nctt')?.value.trim();if(!n)return;S.contacts=S.contacts||[];S.contacts.push({name:n,tel:t});persist();render();};
window.DCT=i=>{S.contacts.splice(i,1);persist();render();};
window.AR=()=>{const v=document.getElementById('nrole')?.value.trim();if(!v)return;S.roles.push(v);persist();render();};
window.DR=i=>{S.roles.splice(i,1);persist();render();};
window.AWK=()=>{const v=document.getElementById('nwork')?.value.trim();if(!v)return;S.works.push(v);persist();render();};
window.DWK=i=>{S.works.splice(i,1);persist();render();};
window.AM2=()=>{const v=document.getElementById('nm')?.value.trim();if(!v)return;S.machines.push(v);persist();render();};
window.DM=i=>{S.machines.splice(i,1);persist();render();};
window.UV=(i,v)=>{S.vehicles[i].allowance=Number(v);persist();};
window.AV=()=>{const n=document.getElementById('nvn')?.value.trim(),a=Number(document.getElementById('nva')?.value||0);if(!n)return;S.vehicles.push({name:n,allowance:a});persist();render();};
window.DV=i=>{S.vehicles.splice(i,1);persist();render();};
init();
</script>
</body>
</html>
